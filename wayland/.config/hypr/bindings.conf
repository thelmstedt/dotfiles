$terminal        = alacritty
$fileManager     = thunar
$menu            = walker
$window_switcher = walker -m windows


$mainMod = SUPER # Sets "Windows" key as main modifier
bind = $mainMod, M, exit,

bind = SUPER, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, period, exec, 1password  --ozone-platform-hint=x11 --quick-access

# layout bindings
bind = $mainMod, F1, exec, hyprctl dispatch fullscreen 1
bind = $mainMod, F2, layoutmsg, orientationleft
bind = $mainMod, F3, layoutmsg, orientationbottom

# TODO need to script this as fullscreen isn't an orientation
# TODO investigate monocle
# bind = $mainMod, Space, layoutmsg, orientationcycle left top right bottom

# focusing
bind = $mainMod, Tab, cyclenext,
bind = $mainMod SHIFT, Tab, cyclenext, prev
bind = $mainMod, Return, layoutmsg, swapwithmaster
# arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#bind = $mainMod, V, togglefloating,


# unfloat and reset split
bind = $mainMod, T, exec, ~/.config/hypr/unfloat.sh

# monitor bindings
bind = $mainMod, W, focusmonitor, 0  # Focus left/first monitor
bind = $mainMod, E, focusmonitor, 1  # Focus right/second monitor
bind = $mainMod SHIFT, W, movewindow, mon:0  # Move window to left/first monitor
bind = $mainMod SHIFT, E, movewindow, mon:1  # Move window to right/second monitor

# launcher
bind = $mainMod, backslash, exec, $menu
bind = $mainMod SHIFT, backslash, exec, $window_switcher
bind = $mainMod SHIFT, V, exec, walker -m clipboard

# applications
bind = $mainMod SHIFT, C, killactive,
bind = $mainMod SHIFT, Return, exec, $terminal
bind = $mainMod SHIFT, N, exec, $fileManager

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, focusworkspaceoncurrentmonitor , 1
bind = $mainMod, 2, focusworkspaceoncurrentmonitor , 2
bind = $mainMod, 3, focusworkspaceoncurrentmonitor , 3
bind = $mainMod, 4, focusworkspaceoncurrentmonitor , 4
bind = $mainMod, 5, focusworkspaceoncurrentmonitor , 5
bind = $mainMod, 6, focusworkspaceoncurrentmonitor , 6
bind = $mainMod, 7, focusworkspaceoncurrentmonitor , 7
bind = $mainMod, 8, focusworkspaceoncurrentmonitor , 8
bind = $mainMod, 9, focusworkspaceoncurrentmonitor , 9
bind = $mainMod, 0, focusworkspaceoncurrentmonitor , 10
bind = $mainMod, minus, focusworkspaceoncurrentmonitor , 11
bind = $mainMod, equal, focusworkspaceoncurrentmonitor , 12

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10
bind = $mainMod SHIFT, minus, movetoworkspacesilent, 11
bind = $mainMod SHIFT, equal, movetoworkspacesilent, 12

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bind = $mainMod, mouse:273, setfloating, active
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod SHIFT, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous